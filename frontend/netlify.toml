[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* → Render backend (set VITE_BACKEND_URL in Netlify env vars)
[[redirects]]
  from   = "/api/*"
  to     = "https://milocare-backend.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — todas las rutas van a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
