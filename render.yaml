services:
  - type: web
    name: milocura-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false          # lo cargás manualmente en el dashboard de Render
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_URL
        sync: false          # URL del frontend en Amplify, ej: https://main.XXXX.amplifyapp.com
      - key: BILLING_NOTIFY_EMAIL
        value: julian.cardozo.viggiano@gmail.com   # recibe los avisos de interés en Premium
      - key: API_URL
        sync: false          # URL pública de ESTE backend (links del email de check-in)
      - key: CHECKIN_ENABLED
        value: 'false'       # 'true' para activar el envío diario del check-in
      # ── Google Wallet (pase de perfil de perro) ──
      - key: GOOGLE_WALLET_ENABLED
        value: 'true'        # habilita POST /api/dogs/:dogId/wallet-pass
      - key: GOOGLE_WALLET_ISSUER_ID
        sync: false
      - key: GOOGLE_WALLET_CLASS_ID
        value: milo_dog_card
      - key: GOOGLE_WALLET_SA_KEY_B64
        sync: false
      - key: WALLET_PUBLIC_BASE_URL
        sync: false          # URL pública del frontend para el QR del pase
      - key: SURPRISE_PROBABILITY
        value: '0.15'
      # ── Notificaciones push (Web Push / VAPID) ──
      - key: PUSH_ENABLED
        value: 'false'       # 'true' para habilitar push
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hola@milocare.online
