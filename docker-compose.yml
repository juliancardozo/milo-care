version: '3.9'

services:
  mongo:
    image: mongo:7.0
    platform: linux/arm64/v8
    container_name: milocura-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    image: node:20-alpine
    container_name: milocura-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: milocura-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '5173:5173'
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
